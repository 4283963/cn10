<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐小游戏 - 自动和弦匹配</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            transition: background 0.8s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        body.style-folk {  
            background: linear-gradient(135deg, #f5e6d3 0%, #d4a574 50%, #8b5a2b 100%);
            color: #3d2914;
        }

        body.style-rock {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #e94560 100%);
            color: #ffffff;
        }

        body.style-classical {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d44 40%, #4a3f6b 70%, #8b7355 100%);
            color: #f0e6d3;
        }

        .bg-decoration {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }

        .vinyl-record {
            display: none;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                #1a1a1a 0px,
                #2a2a2a 2px,
                #1a1a1a 4px
            );
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: spin 20s linear infinite;
        }

        .vinyl-record::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #8b5a2b;
            border: 3px solid #6b4423;
        }

        body.style-folk .vinyl-record {
            display: block;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .stage-lights {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(233, 69, 96, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 0%, rgba(100, 200, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 200, 50, 0.2) 0%, transparent 40%);
            animation: pulse-lights 2s ease-in-out infinite alternate;
        }

        body.style-rock .stage-lights {
            display: block;
        }

        @keyframes pulse-lights {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .concert-hall {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background:
                linear-gradient(to bottom, rgba(139, 115, 85, 0.3) 0%, transparent 30%),
                radial-gradient(ellipse at top center, rgba(255, 245, 200, 0.1) 0%, transparent 60%);
            border-top: 2px solid rgba(139, 115, 85, 0.3);
        }

        body.style-classical .concert-hall {
            display: block;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .style-selector {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            color: inherit;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .style-selector:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .style-selector option {
            color: #333;
            background: white;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        body.style-rock .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        body.style-folk .btn-primary {
            background: linear-gradient(135deg, #8b5a2b 0%, #a0522d 100%);
            box-shadow: 0 4px 15px rgba(139, 90, 43, 0.4);
        }

        body.style-classical .btn-primary {
            background: linear-gradient(135deg, #8b7355 0%, #a08060 100%);
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.4);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-record {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            min-width: 120px;
        }

        .btn-record.recording {
            animation: pulse-record 1s infinite;
        }

        @keyframes pulse-record {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            50% { box-shadow: 0 0 0 15px rgba(255, 107, 107, 0); }
        }

        .piano-container {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .piano {
            display: flex;
            position: relative;
            background: #222;
            padding: 20px 10px 10px;
            border-radius: 10px 10px 5px 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .white-key {
            width: 60px;
            height: 200px;
            background: linear-gradient(to bottom, #fff 0%, #f0f0f0 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            margin: 0 1px;
            position: relative;
            z-index: 1;
            transition: all 0.08s ease;
        }

        .white-key:hover {
            background: linear-gradient(to bottom, #f5f5f5 0%, #e8e8e8 100%);
        }

        .white-key.active {
            background: linear-gradient(to bottom, #ddd 0%, #ccc 100%);
            transform: translateY(2px);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .white-key .note-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #999;
            font-weight: bold;
        }

        .black-key {
            width: 36px;
            height: 120px;
            background: linear-gradient(to bottom, #333 0%, #111 100%);
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            position: absolute;
            z-index: 2;
            top: 20px;
            transition: all 0.08s ease;
        }

        .black-key:hover {
            background: linear-gradient(to bottom, #444 0%, #222 100%);
        }

        .black-key.active {
            background: linear-gradient(to bottom, #222 0%, #000 100%);
            transform: translateY(2px);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .results-panel {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        .results-panel.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chord-display {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .chord-card {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            min-width: 80px;
            text-align: center;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .info-item {
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }

        .info-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .status-message {
            text-align: center;
            padding: 20px;
            font-size: 1.1rem;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin-loading 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin-loading {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .white-key { width: 40px; height: 150px; }
            .black-key { width: 24px; height: 90px; }
            .container { padding: 20px 10px; }
        }
    </style>
</head>
<body class="style-folk">
    <div class="bg-decoration vinyl-record"></div>
    <div class="bg-decoration stage-lights"></div>
    <div class="bg-decoration concert-hall"></div>

    <div class="container">
        <h1>🎵 音乐小游戏</h1>
        <p class="subtitle">弹奏一段旋律，AI 自动为你配上吉他伴奏和弦</p>

        <div class="controls">
            <select id="styleSelect" class="style-selector">
                <option value="folk">🎸 民谣风格</option>
                <option value="rock">🎸 摇滚风格</option>
                <option value="classical">🎹 古典风格</option>
            </select>

            <button id="recordBtn" class="btn btn-record">开始录制</button>
            <button id="playBtn" class="btn" disabled>试听旋律</button>
            <button id="matchBtn" class="btn btn-primary" disabled>匹配和弦</button>
        </div>

        <div class="piano-container">
            <div class="piano" id="piano">
            </div>
        </div>

        <div id="status" class="status-message">
            点击钢琴键盘开始演奏，或按电脑键盘 A-K 演奏白键
        </div>

        <div id="resultsPanel" class="results-panel">
            <div class="results-title">🎼 匹配结果</div>
            <div class="chord-display" id="chordDisplay"></div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">风格</div>
                    <div class="info-value" id="infoStyle">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">调性</div>
                    <div class="info-value" id="infoKey">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">小节数</div>
                    <div class="info-value" id="infoMeasures">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">节奏型</div>
                    <div class="info-value" id="infoRhythm">-</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';

        const NOTE_FREQS = {
            'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
            'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
            'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
            'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25,
            'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99,
            'G#5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'B5': 987.77
        };

        const WHITE_KEYS = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5', 'F5', 'G5', 'A5', 'B5'];
        const BLACK_KEY_POSITIONS = {
            'C#4': 0, 'D#4': 1, 'F#4': 3, 'G#4': 4, 'A#4': 5,
            'C#5': 7, 'D#5': 8, 'F#5': 10, 'G#5': 11, 'A#5': 12
        };

        const KEY_MAP = {
            'a': 'C4', 'w': 'C#4', 's': 'D4', 'e': 'D#4', 'd': 'E4',
            'f': 'F4', 't': 'F#4', 'g': 'G4', 'y': 'G#4', 'h': 'A4',
            'u': 'A#4', 'j': 'B4', 'k': 'C5'
        };

        let audioContext = null;
        let recordedNotes = [];
        let isRecording = false;
        let recordingStartTime = 0;
        let currentStyle = 'folk';

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playNote(pitch, duration = 0.3, velocity = 0.5) {
            initAudio();
            const freq = NOTE_FREQS[pitch];
            if (!freq) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = getOscillatorType();
            oscillator.frequency.setValueAtTime(freq, audioContext.currentTime);

            gainNode.gain.setValueAtTime(0, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(velocity, audioContext.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function getOscillatorType() {
            switch (currentStyle) {
                case 'rock': return 'sawtooth';
                case 'classical': return 'triangle';
                default: return 'sine';
            }
        }

        function buildPiano() {
            const piano = document.getElementById('piano');
            piano.innerHTML = '';

            WHITE_KEYS.forEach((note, index) => {
                const key = document.createElement('div');
                key.className = 'white-key';
                key.dataset.note = note;
                key.innerHTML = `<span class="note-label">${note.replace('4', '').replace('5', '')}</span>`;

                key.addEventListener('mousedown', () => handleKeyPress(note, key));
                key.addEventListener('mouseup', () => handleKeyRelease(key));
                key.addEventListener('mouseleave', () => handleKeyRelease(key));

                piano.appendChild(key);
            });

            Object.entries(BLACK_KEY_POSITIONS).forEach(([note, whiteIndex]) => {
                const key = document.createElement('div');
                key.className = 'black-key';
                key.dataset.note = note;

                const whiteKeyWidth = 62;
                key.style.left = `${(whiteIndex + 1) * whiteKeyWidth - 18}px`;

                key.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    handleKeyPress(note, key);
                });
                key.addEventListener('mouseup', (e) => {
                    e.stopPropagation();
                    handleKeyRelease(key);
                });
                key.addEventListener('mouseleave', () => handleKeyRelease(key));

                piano.appendChild(key);
            });
        }

        function handleKeyPress(note, keyElement) {
            initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            playNote(note, 0.5, 0.6);
            keyElement.classList.add('active');

            if (isRecording) {
                const now = audioContext.currentTime;
                recordedNotes.push({
                    pitch: note,
                    startTime: now - recordingStartTime,
                    duration: 0.5
                });
            }
        }

        function handleKeyRelease(keyElement) {
            keyElement.classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const note = KEY_MAP[e.key.toLowerCase()];
            if (note) {
                const keyElement = document.querySelector(`[data-note="${note}"]`);
                if (keyElement) handleKeyPress(note, keyElement);
            }
        });

        document.addEventListener('keyup', (e) => {
            const note = KEY_MAP[e.key.toLowerCase()];
            if (note) {
                const keyElement = document.querySelector(`[data-note="${note}"]`);
                if (keyElement) handleKeyRelease(keyElement);
            }
        });

        document.getElementById('styleSelect').addEventListener('change', (e) => {
            changeStyle(e.target.value);
        });

        function changeStyle(style) {
            currentStyle = style;
            document.body.className = `style-${style}`;
        }

        document.getElementById('recordBtn').addEventListener('click', () => {
            initAudio();
            isRecording = !isRecording;
            const btn = document.getElementById('recordBtn');

            if (isRecording) {
                recordedNotes = [];
                recordingStartTime = audioContext.currentTime;
                btn.textContent = '停止录制';
                btn.classList.add('recording');
                document.getElementById('status').textContent = '🎙️ 正在录制... 点击钢琴或按键盘演奏';
                document.getElementById('matchBtn').disabled = true;
                document.getElementById('playBtn').disabled = true;
            } else {
                btn.textContent = '重新录制';
                btn.classList.remove('recording');
                const count = recordedNotes.length;
                document.getElementById('status').textContent = `✅ 录制完成，共 ${count} 个音符`;
                document.getElementById('matchBtn').disabled = count === 0;
                document.getElementById('playBtn').disabled = count === 0;
            }
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (recordedNotes.length === 0) return;
            playRecordedNotes();
        });

        function playRecordedNotes() {
            initAudio();
            const startTime = audioContext.currentTime + 0.1;
            recordedNotes.forEach(note => {
                playNoteAtTime(note.pitch, startTime + note.startTime, note.duration);
            });
        }

        function playNoteAtTime(pitch, time, duration) {
            const freq = NOTE_FREQS[pitch];
            if (!freq) return;

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = getOscillatorType();
            oscillator.frequency.setValueAtTime(freq, time);

            gainNode.gain.setValueAtTime(0, time);
            gainNode.gain.linearRampToValueAtTime(0.5, time + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start(time);
            oscillator.stop(time + duration);
        }

        document.getElementById('matchBtn').addEventListener('click', matchChords);

        async function matchChords() {
            if (recordedNotes.length === 0) return;

            const btn = document.getElementById('matchBtn');
            btn.disabled = true;
            document.getElementById('status').innerHTML = '<span class="loading"></span>AI 正在匹配和弦...';

            try {
                const notesPayload = recordedNotes.map(n => ({
                    pitch: n.pitch.replace(/\d/, ''),
                    duration: n.duration
                }));

                const response = await fetch(`${API_BASE}/melodies/match`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        notes: notesPayload,
                        style: currentStyle,
                        title: '玩家弹奏的旋律'
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || '匹配失败');
                }

                const data = await response.json();
                displayResults(data);
                document.getElementById('status').textContent = '🎵 和弦匹配完成！';

            } catch (error) {
                console.error('Match error:', error);
                document.getElementById('status').textContent = `❌ 匹配失败: ${error.message}`;
            } finally {
                btn.disabled = false;
            }
        }

        function displayResults(data) {
            const panel = document.getElementById('resultsPanel');
            panel.classList.add('visible');

            const chordDisplay = document.getElementById('chordDisplay');
            chordDisplay.innerHTML = '';
            (data.chords || []).forEach(chord => {
                const card = document.createElement('div');
                card.className = 'chord-card';
                card.textContent = chord;
                chordDisplay.appendChild(card);
            });

            document.getElementById('infoStyle').textContent =
                (data.styleInfo && data.styleInfo.name) ? data.styleInfo.name : data.style || '-';
            document.getElementById('infoKey').textContent =
                `${data.key || '-'} ${data.key_type || data.keyType || ''}`;
            document.getElementById('infoMeasures').textContent =
                data.num_measures || data.numMeasures || '-';
            document.getElementById('infoRhythm').textContent =
                (data.rhythm_pattern && data.rhythm_pattern.pattern_name)
                    ? data.rhythm_pattern.pattern_name
                    : (data.rhythmPattern && data.rhythmPattern.patternName)
                        ? data.rhythmPattern.patternName
                        : '-';
        }

        buildPiano();
    </script>
</body>
</html>
