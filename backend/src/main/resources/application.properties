spring.application.name=chord-matcher

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/music_game
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

chord-matcher.python-path=python3
chord-matcher.script-path=../ai/chord_matcher.py
chord-matcher.model-path=../ai/model/chord_model.npz
